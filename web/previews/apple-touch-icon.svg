<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f3650"/>
      <stop offset="0.5" stop-color="#15273a"/>
      <stop offset="1" stop-color="#0c1726"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#dde4ee"/>
      <stop offset="0.5" stop-color="#93a4b7"/>
      <stop offset="1" stop-color="#eef3f8"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.3" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#3a5a7d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0c1726" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#glow)"/>
  <rect width="512" height="512" fill="url(#metal)" opacity="0.05"/>
  <!-- thin frame rule for a refined architectural plate -->
  <rect x="36" y="36" width="440" height="440" fill="none" stroke="url(#metal)" stroke-width="2" opacity="0.35"/>
  <g fill="url(#metal)">
    <rect x="150" y="112" width="62" height="288"/>
    <rect x="300" y="112" width="62" height="288"/>
    <rect x="150" y="225" width="212" height="62"/>
  </g>
  <g fill="#15273a" opacity="0.2">
    <rect x="168" y="112" width="6" height="288"/>
    <rect x="318" y="112" width="6" height="288"/>
  </g>
  <!-- baseline tick marks, like a drafting scale -->
  <g fill="url(#metal)" opacity="0.5">
    <rect x="150" y="408" width="62" height="4"/>
    <rect x="300" y="408" width="62" height="4"/>
  </g>
</svg>
