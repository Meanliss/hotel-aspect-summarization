<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2e44"/>
      <stop offset="0.55" stop-color="#22384f"/>
      <stop offset="1" stop-color="#0f1d2e"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#cfd8e3"/>
      <stop offset="0.5" stop-color="#8fa0b3"/>
      <stop offset="1" stop-color="#e6ecf3"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- subtle metallic sheen -->
  <rect width="512" height="512" fill="url(#metal)" opacity="0.06"/>
  <!-- architectural H: two columns + a beam, drawn as solid pillars -->
  <g fill="url(#metal)">
    <rect x="150" y="118" width="58" height="276"/>
    <rect x="304" y="118" width="58" height="276"/>
    <rect x="150" y="227" width="212" height="58"/>
  </g>
  <!-- fine inner highlight lines for a precise, drafted look -->
  <g fill="#1a2e44" opacity="0.18">
    <rect x="166" y="118" width="6" height="276"/>
    <rect x="320" y="118" width="6" height="276"/>
  </g>
</svg>
